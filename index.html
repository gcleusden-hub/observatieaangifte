<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Rubric Beoordeling Gesprek</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    textarea { width: 100%; }
    button { margin: 10px 5px; padding: 10px 15px; }
  </style>
</head>
<body>

<h1>Rubric – Gesprek Aangifte</h1>

<table id="rubricTable">
  <tr>
    <th>Criteria</th>
    <th>1</th>
    <th>2</th>
    <th>3</th>
    <th>4</th>
    <th>5</th>
    <th>Feedback</th>
  </tr>
</table>

<button onclick="generateReport()">Genereer Rapport (voor WhatsApp)</button>
<button onclick="clearForm()">Wis formulier</button>

<textarea id="output" rows="10" placeholder="Hier verschijnt de tekst..."></textarea>

<script>
const criteria = [
  "Contact maken",
  "Informatie geven",
  "Informatie verzamelen",
  "Volledigheid informatie",
  "Probleemanalyse",
  "Dossiervorming",
  "Gesprek afronden",
  "Slachtoffergericht handelen",
  "Professioneel handelen"
];

const table = document.getElementById("rubricTable");

criteria.forEach((c, i) => {
  let row = table.insertRow();
  let cell = row.insertCell(0);
  cell.innerText = c;

  for (let j = 1; j <= 5; j++) {
    let scoreCell = row.insertCell(j);
    scoreCell.innerHTML = `<input type="radio" name="crit${i}" value="${j}">`;
  }

  let feedbackCell = row.insertCell(6);
  feedbackCell.innerHTML = `<textarea id="fb${i}" rows="2"></textarea>`;
});

function generateReport() {
  let text = "Beoordeling gesprek aangifte:%0A%0A";

  criteria.forEach((c, i) => {
    let score = document.querySelector(`input[name=crit${i}]:checked`);
    let fb = document.getElementById(`fb${i}`).value;

    text += `${c}: ${score ? score.value : "-"}%0AFeedback: ${fb}%0A%0A`;
  });

  document.getElementById("output").value = decodeURIComponent(text);

  let whatsappURL = `https://wa.me/?text=${text}`;
  window.open(whatsappURL, '_blank');
}

function clearForm() {
  document.querySelectorAll('input[type=radio]').forEach(el => el.checked = false);
  document.querySelectorAll('textarea').forEach(el => el.value = "");
}
</script>

</body>
</html>
